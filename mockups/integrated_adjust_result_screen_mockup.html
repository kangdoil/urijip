<!--
  참고: 원본 파일이 인코딩 손상(mojibake) 상태로 전달되어 한글 텍스트를 문맥으로
  재구성했다. CSS 변수명/JS 로직은 원본 그대로다. JS 샘플 데이터의 구역명은
  손상으로 정확한 원문을 알 수 없어, 실제 시드된 areas 데이터(data/areas-seed.json)의
  진짜 행정동 이름으로 교체했다 (가격·통근시간 수치는 원본 값 유지 — 원본이
  숫자라 손상되지 않았음).

  이 목업은 PRD §6 ⑤결과 + ⑥조율을 합친 화면으로 보이며, 매칭 엔진(로드맵 Phase 2)이
  있어야 실제 데이터로 동작한다. Phase 1(입력 화면)에는 참고만 하고 구현은 보류.
-->
<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)">조건을 조정하면 함께 갈 수 있는 구역 리스트가 실시간으로 갱신되는 통합 조율 화면 목업</h2>
<div style="background: var(--surface-1); border-radius: 16px; padding: 24px; display: flex; justify-content: center;">
<div style="width: 360px; max-width: 100%; background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 20px; padding: 20px 20px 24px;">

  <p style="font-size: 13px; color: var(--text-muted); margin: 0 0 4px;">함께 조율하기</p>
  <p style="font-size: 18px; font-weight: 500; margin: 0 0 14px;">조건을 움직이면 구역이 바로 바뀌어요</p>

  <div style="border: 0.5px solid var(--border-strong); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
      <span style="font-size: 14px; font-weight: 500;"><i class="ti ti-building" aria-hidden="true" style="font-size:14px; vertical-align:-2px;"></i> 년식 · <span style="color:#534AB7; font-weight:500;">A</span> 필수 / <span style="color:#0F6E56; font-weight:500;">B</span> 무관</span>
    </div>
    <div style="display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px;">
      <button id="yr-must" onclick="setYear('must')" style="border: 2px solid var(--border-accent); background: var(--bg-accent); color: var(--text-accent); border-radius: 10px; padding: 8px 6px; font-size: 13px; font-weight: 500; cursor: pointer;">신축 필수 유지</button>
      <button id="yr-nice" onclick="setYear('nice')" style="border: 0.5px solid var(--border-strong); border-radius: 10px; padding: 8px 6px; font-size: 13px; font-weight: 500; cursor: pointer;">선호로 완화</button>
    </div>
  </div>

  <div style="border: 0.5px solid var(--border-strong); border-radius: 12px; padding: 12px 14px; margin-bottom: 14px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
      <span style="font-size: 14px; font-weight: 500;"><i class="ti ti-coin" aria-hidden="true" style="font-size:14px; vertical-align:-2px;"></i> 예산 상한</span>
      <span id="budget-val" style="font-size: 14px; font-weight: 500;">5.0억</span>
    </div>
    <div style="display: flex; align-items: center; gap: 10px;">
      <span style="font-size: 12px; color: #0F6E56; font-weight: 500;">B 5억</span>
      <input type="range" id="budget" min="5" max="6" step="0.1" value="5" style="flex: 1;" oninput="setBudget(this.value)">
      <span style="font-size: 12px; color: #534AB7; font-weight: 500;">A 6억</span>
    </div>
  </div>

  <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px;">
    <span style="font-size: 14px; font-weight: 500;">함께 갈 수 있는 구역 <span id="count" style="color: var(--text-accent);">3</span>곳</span>
    <span id="count-diff" style="font-size: 12px; color: var(--text-muted);">처음 결과와 같아요</span>
  </div>

  <div id="area-list" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px;"></div>

  <button id="propose" onclick="propose()" style="width: 100%; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 500; cursor: pointer;">이 기준을 B에게 제안하기 →</button>
  <p style="font-size: 11px; color: var(--text-muted); text-align: center; margin: 8px 0 0;">B가 동의하면 새 기준으로 결과가 저장돼요</p>
</div>
</div>
<script>
const areas = [
  { n: "경기 성남시 분당구 정자2동", p: 4.2, nb: true,  a: 32, b: 48 },
  { n: "경기 광주시 오포2동",        p: 4.5, nb: true,  a: 35, b: 52 },
  { n: "경기 용인시 기흥구 상하동",  p: 4.8, nb: true,  a: 28, b: 28 },
  { n: "경기 성남시 중원구 성남동",  p: 4.9, nb: false, a: 20, b: 38 },
  { n: "경기 성남시 수정구 수진2동", p: 5.2, nb: false, a: 38, b: 30 },
  { n: "경기 과천시 중앙동",         p: 5.4, nb: false, a: 18, b: 35 },
  { n: "경기 광주시 광남1동",        p: 5.6, nb: true,  a: 22, b: 33 },
  { n: "경기 하남시 감북동",         p: 5.8, nb: true,  a: 52, b: 40 },
  { n: "경기 광주시 남한산성면",     p: 5.9, nb: false, a: 25, b: 20 }
];
let yearTier = "must", budget = 5.0;
const baseline = new Set(areas.filter(x => x.nb && x.p <= 5.0).map(x => x.n));
function matches() {
  return areas
    .filter(x => x.p <= budget + 1e-9 && (yearTier === "nice" || x.nb))
    .sort((x, y) => (x.a + y.b, x.a + x.b) - (y.a + y.b));
}
function refresh() {
  const list = matches();
  document.getElementById("count").textContent = list.length;
  const diff = list.length - baseline.size;
  const de = document.getElementById("count-diff");
  if (diff <= 0) { de.textContent = "처음 결과와 같아요"; de.style.color = "var(--text-muted)"; }
  else { de.textContent = "처음보다 " + diff + "곳 늘었어요"; de.style.color = "var(--text-success)"; }
  document.getElementById("area-list").innerHTML = list.map(x => {
    const isNew = !baseline.has(x.n);
    const newBadge = isNew ? '<span style="font-size:11px;padding:2px 8px;border-radius:20px;background:#FAEEDA;color:#854F0B;margin-left:6px;">완화로 열림</span>' : "";
    const nbBadge = x.nb ? '<span style="font-size:11px;color:var(--text-secondary);">신축</span>' : '<span style="font-size:11px;color:var(--text-muted);">구축</span>';
    return '<div onclick="sendPrompt(\'' + x.n + ' 구역의 상세 매칭 근거를 보여줘\')" style="border:0.5px solid ' + (isNew ? "#FAC775" : "var(--border)") + ';border-radius:12px;padding:11px 14px;cursor:pointer;">'
      + '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;">'
      + '<span style="font-size:14px;font-weight:500;">' + x.n + newBadge + '</span>'
      + '<span style="font-size:13px;font-weight:500;">' + x.p.toFixed(1) + '억</span></div>'
      + '<div style="display:flex;gap:10px;font-size:12px;align-items:center;">'
      + '<span style="color:#534AB7;"><i class="ti ti-clock" aria-hidden="true" style="font-size:12px;vertical-align:-2px;"></i> A ' + x.a + '분</span>'
      + '<span style="color:#0F6E56;"><i class="ti ti-clock" aria-hidden="true" style="font-size:12px;vertical-align:-2px;"></i> B ' + x.b + '분</span>'
      + '<span style="margin-left:auto;">' + nbBadge + '</span></div></div>';
  }).join("") || '<p style="font-size:13px;color:var(--text-secondary);text-align:center;padding:16px 0;">이 기준을 만족하는 구역이 없어요</p>';
}
function setYear(t) {
  yearTier = t;
  const m = document.getElementById("yr-must"), n = document.getElementById("yr-nice");
  const on = t === "must" ? m : n, off = t === "must" ? n : m;
  on.style.border = "2px solid var(--border-accent)"; on.style.background = "var(--bg-accent)"; on.style.color = "var(--text-accent)";
  off.style.border = "0.5px solid var(--border-strong)"; off.style.background = "transparent"; off.style.color = "var(--text-primary)";
  refresh();
}
function setBudget(v) {
  budget = parseFloat(v);
  document.getElementById("budget-val").textContent = budget.toFixed(1) + "억";
  refresh();
}
function propose() {
  const b = document.getElementById("propose");
  b.textContent = "제안 완료 · B 확인 대기 중";
  b.style.opacity = "0.5"; b.style.pointerEvents = "none";
}
refresh();
</script>
